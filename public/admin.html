<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admin Panel — HAM LUXURY PERFUME</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400;500;600;700;900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    :root{
      --primary-gradient: linear-gradient(135deg, #C084FC 0%, #8B5CF6 50%, #06B6D4 100%);
      --primary-gold: #FFD700;
      --secondary-gold: #FFA500;
      --accent-purple: #A855F7;
      --accent-cyan: #06B6D4;
      --dark-bg: #0a0a0a;
      --glass-bg: rgba(255, 255, 255, 0.08);
      --glass-border: rgba(255, 255, 255, 0.15);
      --text-light: #f8fafc;
      --text-muted: rgba(255, 255, 255, 0.7);
      --success-glow: rgba(34, 197, 94, 0.3);
      --warning-glow: rgba(251, 191, 36, 0.3);
      --danger-glow: rgba(239, 68, 68, 0.3);
    }

    * {
      box-sizing: border-box;
    }

    body{ 
      font-family: 'Poppins', 'Montserrat', sans-serif; 
      margin:0; 
      padding:20px;
      background: 
        linear-gradient(135deg, #0a0a0a 0%, #1a0d2e 50%, #0f172a 100%),
        radial-gradient(circle at 20% 20%, rgba(192, 132, 252, 0.15) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(6, 182, 212, 0.1) 0%, transparent 50%);
      color: var(--text-light);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        radial-gradient(circle at 10% 20%, rgba(192, 132, 252, 0.2) 0%, transparent 50%),
        radial-gradient(circle at 90% 80%, rgba(6, 182, 212, 0.15) 0%, transparent 50%),
        radial-gradient(circle at 50% 10%, rgba(168, 85, 247, 0.1) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
      animation: shimmer 20s ease-in-out infinite;
    }

    @keyframes shimmer {
      0%, 100% { opacity: 0.8; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.05); }
    }

    header{ 
      display:flex; 
      justify-content:space-between; 
      align-items:center;
      gap:20px; 
      margin-bottom:32px;
      padding: 28px 32px;
      background: rgba(10, 10, 10, 0.95);
      backdrop-filter: blur(20px) saturate(180%);
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: 
        0 25px 50px -12px rgba(0,0,0,0.7),
        0 0 0 1px rgba(255,255,255,0.05),
        inset 0 1px 0 rgba(255,255,255,0.1);
      position: relative;
      z-index: 10;
      animation: slideInDown 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    @keyframes slideInDown {
      from { opacity: 0; transform: translateY(-30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    header h1{ 
      margin:0; 
      font-size:28px; 
      background: var(--primary-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      letter-spacing: 2px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .panel { 
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(20px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 24px; 
      padding:32px;
      box-shadow: 
        0 25px 50px -12px rgba(0,0,0,0.5),
        0 0 0 1px rgba(255,255,255,0.05);
      margin-bottom:32px;
      position: relative;
      z-index: 10;
      transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .panel:hover {
      transform: translateY(-4px);
      box-shadow: 
        0 35px 70px -12px rgba(0,0,0,0.6),
        0 0 0 1px rgba(255,255,255,0.08);
    }

    .panel h2 {
      font-family: 'Playfair Display', serif;
      background: var(--primary-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-size: 28px;
      margin-bottom: 28px;
      letter-spacing: 1.5px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    table{ 
      width:100%; 
      border-collapse:collapse; 
      font-size:14px;
      background: rgba(0, 0, 0, 0.4);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    thead th{ 
      text-align:left; 
      padding:20px 24px;
      background: var(--primary-gradient);
      color:#fff; 
      font-size:14px;
      font-weight: 600;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      position: relative;
    }

    thead th::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: rgba(255,255,255,0.3);
    }

    tbody td{ 
      padding:20px 24px; 
      border-bottom:1px solid rgba(255, 255, 255, 0.08); 
      color: var(--text-light);
      transition: all 0.3s ease;
    }

    tbody tr:hover{ 
      background: rgba(192, 132, 252, 0.1);
      transform: scale(1.02);
      box-shadow: 0 10px 25px rgba(192, 132, 252, 0.15);
    }

    .actions button{ 
      margin-right:10px; 
      padding:12px 18px; 
      border-radius: 16px;
      border:none; 
      cursor:pointer; 
      font-size:13px;
      font-weight: 600;
      letter-spacing: 0.8px;
      transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      position: relative;
      overflow: hidden;
    }

    .actions button::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transition: left 0.5s;
    }

    .actions button:hover::before {
      left: 100%;
    }

    .confirm-btn{ 
      background: linear-gradient(45deg, #10B981, #059669); 
      color:#fff; 
      box-shadow: 0 4px 15px var(--success-glow);
    }

    .confirm-btn:hover{ 
      transform: translateY(-3px) scale(1.05);
      box-shadow: 0 8px 25px var(--success-glow);
    }

    .delete-btn{ 
      background: linear-gradient(45deg, #EF4444, #DC2626); 
      color:#fff; 
      box-shadow: 0 4px 15px var(--danger-glow);
    }

    .delete-btn:hover{ 
      transform: translateY(-3px) scale(1.05);
      box-shadow: 0 8px 25px var(--danger-glow);
    }

    .print-btn{ 
      background: linear-gradient(45deg, #06B6D4, #0891B2); 
      color:#fff; 
      box-shadow: 0 4px 15px rgba(6, 182, 212, 0.3);
    }

    .print-btn:hover{ 
      transform: translateY(-3px) scale(1.05);
      box-shadow: 0 8px 25px rgba(6, 182, 212, 0.4);
    }

    .edit-btn{ 
      background: linear-gradient(45deg, #F59E0B, #D97706); 
      color:#fff; 
      box-shadow: 0 4px 15px var(--warning-glow);
    }

    .edit-btn:hover{ 
      transform: translateY(-3px) scale(1.05);
      box-shadow: 0 8px 25px var(--warning-glow);
    }

    .small-muted { 
      color: var(--text-muted); 
      font-size:13px; 
    }

    .flex-row { 
      display:flex; 
      gap:32px; 
      align-items:flex-start; 
      flex-wrap:wrap; 
    }

    .product-form { 
      width:420px; 
      min-width:320px; 
      background: rgba(0, 0, 0, 0.4);
      padding: 28px;
      border-radius: 24px;
      border: 1px solid rgba(192, 132, 252, 0.3);
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
      backdrop-filter: blur(10px);
    }

    .product-list { 
      flex:1; 
      min-width:350px; 
      max-width:1000px; 
    }

    label { 
      display:block; 
      margin:16px 0 10px; 
      font-size:14px;
      color: var(--accent-purple);
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    input[type="text"], 
    input[type="number"], 
    textarea {
      width:100%; 
      padding:16px 20px; 
      border-radius:16px; 
      border:1px solid rgba(192, 132, 252, 0.3);
      background: rgba(0, 0, 0, 0.5);
      color: var(--text-light);
      font-size: 14px;
      transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      backdrop-filter: blur(10px);
    }

    input[type="text"]:focus, 
    input[type="number"]:focus, 
    textarea:focus {
      border-color: var(--accent-purple);
      box-shadow: 
        0 0 0 0.25rem rgba(192, 132, 252, 0.2),
        0 8px 25px rgba(192, 132, 252, 0.15);
      outline: none;
      transform: translateY(-2px);
    }

    textarea{ 
      min-height:120px; 
      resize:vertical; 
      font-family: inherit;
    }

    .btn-primary { 
      background: var(--primary-gradient); 
      color:#fff; 
      border:none; 
      padding:16px 28px;
      border-radius:16px; 
      cursor:pointer;
      font-weight: 700;
      letter-spacing: 1.2px;
      font-size: 14px;
      transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      box-shadow: 0 10px 30px rgba(192, 132, 252, 0.3);
      position: relative;
      overflow: hidden;
      width: 100%;
      margin-top: 8px;
    }

    .btn-primary:hover { 
      transform: translateY(-4px) scale(1.02);
      box-shadow: 0 20px 40px rgba(192, 132, 252, 0.4);
    }

    .product-item{ 
      display:flex; 
      align-items:center; 
      justify-content:space-between;
      padding:24px 28px; 
      border-radius:20px; 
      margin-bottom:16px; 
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      position: relative;
      overflow: hidden;
    }

    .product-item::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: var(--primary-gradient);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .product-item:hover::before {
      opacity: 1;
    }

    .product-item:hover{
      background: rgba(192, 132, 252, 0.12);
      transform: translateX(8px) translateY(-4px);
      box-shadow: 0 20px 40px rgba(192, 132, 252, 0.2);
    }

    .product-meta{ 
      display:flex; 
      align-items:center; 
      gap:20px; 
    }

    .product-thumb{ 
      width:72px; 
      height:72px; 
      object-fit:cover; 
      border-radius:16px; 
      border:3px solid var(--accent-purple);
      box-shadow: 
        0 10px 30px rgba(168, 85, 247, 0.3),
        inset 0 1px 0 rgba(255,255,255,0.2);
      transition: all 0.3s ease;
      background: linear-gradient(135deg, #8B5CF6, #C084FC);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 700;
      font-size: 12px;
    }

    .product-item:hover .product-thumb {
      transform: scale(1.1) rotate(5deg);
      border-color: var(--accent-cyan);
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 24px;
      margin-bottom: 32px;
    }

    .stat-card {
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(20px) saturate(180%);
      border: 1px solid rgba(192, 132, 252, 0.2);
      border-radius: 24px;
      padding: 32px 24px;
      text-align: center;
      transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      position: relative;
      overflow: hidden;
    }

    .stat-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: var(--primary-gradient);
    }

    .stat-card:hover {
      transform: translateY(-8px) scale(1.02);
      box-shadow: 
        0 30px 60px rgba(192, 132, 252, 0.25),
        0 0 0 1px rgba(192, 132, 252, 0.2);
    }

        .stat-card h3 {
      font-family: 'Playfair Display', serif;
      background: var(--primary-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-size: 40px;
      font-weight: 700;
      margin: 0 0 12px 0;
      letter-spacing: -1px;
    }

    .stat-card p {
      color: var(--text-muted);
      margin: 0;
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 0.5px;
    }

    .badge {
      display: inline-block;
      padding: 8px 16px;
      border-radius: 25px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.5px;
      backdrop-filter: blur(10px);
    }

    .badge-success {
      background: rgba(34, 197, 94, 0.15);
      color: #10B981;
      border: 1px solid rgba(34, 197, 94, 0.3);
      box-shadow: 0 4px 15px var(--success-glow);
    }

    .badge-warning {
      background: rgba(251, 191, 36, 0.15);
      color: #F59E0B;
      border: 1px solid rgba(251, 191, 36, 0.3);
      box-shadow: 0 4px 15px var(--warning-glow);
    }

    .badge-danger {
      background: rgba(239, 68, 68, 0.15);
      color: #EF4444;
      border: 1px solid rgba(239, 68, 68, 0.3);
      box-shadow: 0 4px 15px var(--danger-glow);
    }

    .price-strikethrough {
      text-decoration: line-through;
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 500;
    }

    .price-highlight {
      color: var(--primary-gold);
      font-size: 20px;
      font-weight: 800;
      text-shadow: 0 2px 10px rgba(255, 215, 0, 0.3);
    }

    .save-badge {
      background: linear-gradient(45deg, #10B981, #059669);
      color: #fff;
      font-size: 12px;
      padding: 4px 12px;
      border-radius: 20px;
      font-weight: 700;
      box-shadow: 0 4px 15px var(--success-glow);
    }

    @media (max-width: 992px){
      .flex-row { 
        flex-direction:column; 
      }
      .product-form { 
        width:100%; 
      }
      .stats-grid {
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 20px;
      }
      header {
        flex-direction: column;
        text-align: center;
        gap: 16px;
      }
    }

    @media (max-width: 768px){
      body {
        padding: 12px;
      }
      .stats-grid {
        grid-template-columns: 1fr 1fr;
      }
      .panel {
        padding: 20px;
      }
      table {
        font-size: 12px;
      }
      thead th, tbody td {
        padding: 12px 16px;
      }
      .product-item {
        flex-direction: column;
        align-items: flex-start;
        gap: 16px;
      }
      .actions button {
        margin-right: 0;
        margin-bottom: 8px;
        width: 100%;
      }
    }

    @media (max-width: 480px){
      .stats-grid {
        grid-template-columns: 1fr;
      }
      header h1 {
        font-size: 22px;
      }
    }

    /* Loading Animation */
    .loading {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255,255,255,.3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 1s ease-in-out infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Pulse Animation for Stats */
    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 20px rgba(192, 132, 252, 0.3); }
      50% { box-shadow: 0 0 40px rgba(192, 132, 252, 0.6); }
    }

    .stat-card h3 {
      animation: pulse-glow 2s ease-in-out infinite;
    }
  </style>
</head>

<div class="product-form">
  <form id="productForm">
    <label for="pname"><i class="fas fa-tag"></i> Product Name</label>
    <input id="pname" type="text" required placeholder="e.g. Lumina Glow Serum" />
    
    <label for="pcategory"><i class="fas fa-list"></i> Category</label>
    <input id="pcategory" type="text" placeholder="Skincare, Makeup, Fragrance" />
    
    <label for="poriginalprice"><i class="fas fa-rupee-sign"></i> Original Price</label>
    <input id="poriginalprice" type="number" required placeholder="5000" />
    
    <label for="pprice"><i class="fas fa-percent"></i> Offer Price</label>
    <input id="pprice" type="number" required placeholder="3999" />
    
    <!-- NEW FILE UPLOAD -->
    <label for="pimageFile"><i class="fas fa-image"></i> Product Image</label>
    <div style="position: relative; display: flex; align-items: center; gap: 12px; margin-bottom: 8px;">
      <input id="pimageFile" type="file" accept="image/*" style="flex: 1;" />
      <div id="uploadProgress" style="display: none; font-size: 12px; color: #10B981;">
        <i class="fas fa-check"></i> Uploaded!
      </div>
      <div id="uploadSpinner" style="display: none;">
        <i class="fas fa-spinner fa-spin"></i>
      </div>
    </div>
    <input id="pimage" type="text" readonly placeholder="Image will appear here after upload" style="background: rgba(0,0,0,0.3); color: var(--accent-cyan);" />
    
    <label for="pdesc"><i class="fas fa-align-left"></i> Description</label>
    <textarea id="pdesc" placeholder="Describe your premium beauty product..."></textarea>
    
    <div style="margin-top:20px;">
      <button class="btn-primary" type="submit" id="productSubmit">
        <i class="fas fa-plus"></i> Add Premium Product
      </button>
      <button type="button" id="productCancel" style="margin-left:12px; display:none; background:rgba(255,255,255,0.1); color:#fff; border:1px solid rgba(192,132,252,0.4); padding:16px 28px; border-radius:16px; cursor:pointer; transition: all 0.3s ease;">
        <i class="fas fa-times"></i> Cancel
      </button>
    </div>
  </form>
</div>

      <div class="product-list">

      const confirmBtn = tr.querySelector('.confirm-btn');
      const printBtn = tr.querySelector('.print-btn');
      const delBtn = tr.querySelector('.delete-btn');
      
      confirmBtn.onclick = () => confirmOrder(order._id);
      printBtn.onclick = () => printOrder(order);
      delBtn.onclick = () => deleteOrder(order._id);
      
      tbody.appendChild(tr);
    });
  } catch(err){
    console.error(err);
    tbody.innerHTML = '<tr><td colspan="9" class="text-danger text-center py-5"><i class="fas fa-exclamation-triangle"></i><br>Error loading orders.</td></tr>';
  }
}

async function confirmOrder(id){
  try {
    await authFetch(`${API_ORDERS}/${id}`, {
      method: 'PUT',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({status: 'Preparing'})
    });
    loadOrders();
    loadStatistics();
  } catch(err) {
    alert('Error updating order');
  }
}

async function deleteOrder(id){
  if(confirm('Are you sure you want to delete this order? This action cannot be undone.')){
    try {
      await authFetch(`${API_ORDERS}/${id}`, {method: 'DELETE'});
      loadOrders();
      loadStatistics();
    } catch(err) {
      alert('Error deleting order');
    }
  }
}

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = String(str||'');
  return div.innerHTML;
}

/* --------------------------- FILE UPLOAD HANDLER (NEW) ---------------------------- */
document.addEventListener('DOMContentLoaded', function() {
  // File upload handler
  const fileInput = document.getElementById('pimageFile');
  if (fileInput) {
    fileInput.addEventListener('change', async function(e) {
      const file = e.target.files[0];
      if (!file) return;
      
      const progressEl = document.getElementById('uploadProgress');
      const spinnerEl = document.getElementById('uploadSpinner');
      const imageUrlEl = document.getElementById('pimage');
      
      spinnerEl.style.display = 'block';
      progressEl.style.display = 'none';
      
      try {
        const formData = new FormData();
        formData.append('image', file);
        
        const res = await authFetch('/api/upload', {
          method: 'POST',
          body: formData
        });
        
        if (res.ok) {
          const data = await res.json();
          imageUrlEl.value = data.url;
          
          spinnerEl.style.display = 'none';
          progressEl.style.display = 'block';
          progressEl.innerHTML = '<i class="fas fa-check"></i> Uploaded!';
          progressEl.style.color = '#10B981';
          
          setTimeout(() => {
            progressEl.style.display = 'none';
          }, 3000);
        } else {
          throw new Error('Upload failed');
        }
      } catch (err) {
        spinnerEl.style.display = 'none';
        progressEl.style.display = 'block';
        progressEl.innerHTML = '<i class="fas fa-times"></i> Upload failed';
        progressEl.style.color = '#EF4444';
        alert('Image upload failed. Please try again.');
        console.error('Upload error:', err);
      }
    });
  }
});

function populateProductForm(p){
  document.getElementById('pname').value = p.name || '';
  document.getElementById('pcategory').value = p.category || '';
  document.getElementById('poriginalprice').value = p.originalPrice || p.price || '';
  document.getElementById('pprice').value = p.price || '';
  document.getElementById('pimage').value = p.imageUrl || '';
  document.getElementById('pimageFile').value = ''; // Clear file input
  document.getElementById('pdesc').value = p.description || '';
  
  editProductId = p._id;
  document.getElementById('productSubmit').innerHTML = '<i class="fas fa-save"></i> Update Product';
  document.getElementById('productCancel').style.display = 'block';
  
  document.querySelector('.product-form').scrollIntoView({ behavior: 'smooth' });
}

async function deleteProduct(id){
  if(confirm('Are you sure you want to delete this premium product? This action cannot be undone.')){
    try {
      await authFetch(`${API_PRODUCTS}/${id}`, {method: 'DELETE'});
      fetchProducts();
      loadStatistics();
    } catch(err) {
      alert('Error deleting product');
    }
  }
}

// Form handlers
document.getElementById('productCancel').onclick = () => {
  document.getElementById('productForm').reset();
  document.getElementById('pimage').value = '';
  editProductId = null;
  document.getElementById('productSubmit').innerHTML = '<i class="fas fa-plus"></i> Add Premium Product';
  document.getElementById('productCancel').style.display = 'none';
};

document.getElementById('productForm').onsubmit = async e => {
  e.preventDefault();
  
  const formData = {
    name: document.getElementById('pname').value.trim(),
    originalPrice: Number(document.getElementById('poriginalprice').value) || 0,
    price: Number(document.getElementById('pprice').value) || 0,
    category: document.getElementById('pcategory').value.trim(),
    imageUrl: document.getElementById('pimage').value.trim(),
    description: document.getElementById('pdesc').value.trim()
  };

  if (!formData.name || formData.price <= 0) {
    alert('Please fill name and valid price');
    return;
  }

  try {
    if (editProductId) {
      await authFetch(`${API_PRODUCTS}/${editProductId}`, {
        method: 'PUT',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(formData)
      });
    } else {
      await authFetch(API_PRODUCTS, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(formData)
      });
    }
    
    // Reset form
    document.getElementById('productForm').reset();
    document.getElementById('pimage').value = '';
    editProductId = null;
    document.getElementById('productSubmit').innerHTML = '<i class="fas fa-plus"></i> Add Premium Product';
    document.getElementById('productCancel').style.display = 'none';
    
    // Refresh data
    fetchProducts();
    loadStatistics();
    
    // Success feedback
    const btn = document.getElementById('productSubmit');
    const originalText = btn.innerHTML;
    btn.innerHTML = '<i class="fas fa-check"></i> Saved!';
    btn.style.background = 'linear-gradient(45deg, #10B981, #059669)';
    setTimeout(() => {
      btn.innerHTML = originalText;
      btn.style.background = '';
    }, 2000);
    
  } catch(err) {
    alert('Error saving product. Please try again.');
    console.error(err);
  }
};

/* --------------------------- INITIALIZATION & AUTO-REFRESH ---------------------------- */
async function init() {
  await Promise.all([loadOrders(), fetchProducts(), loadStatistics()]);
}

// Initialize
init();

// Auto refresh every 30 seconds
setInterval(() => {
  loadOrders();
  loadStatistics();
}, 30000);
