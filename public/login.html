<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | HAM LUXURY PERFUME</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      overflow: hidden;
      position: relative;
    }

    /* Animated Background Particles */
    body::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-image: 
        radial-gradient(circle at 20% 80%, rgba(120,119,198,0.3) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(255,255,255,0.1) 0%, transparent 50%),
        radial-gradient(circle at 40% 40%, rgba(120,219,255,0.2) 0%, transparent 50%);
      animation: float 20s ease-in-out infinite;
      z-index: 1;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-20px) rotate(180deg); }
    }

    .login-container {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
      position: relative;
      z-index: 2;
    }

    .login-box {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      padding: 50px 40px;
      border-radius: 25px;
      box-shadow: 
        0 25px 45px rgba(0,0,0,0.1),
        0 0 0 1px rgba(255,255,255,0.05),
        inset 0 1px 0 rgba(255,255,255,0.6);
      width: 100%;
      max-width: 420px;
      transform: translateY(20px);
      animation: slideUp 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
      position: relative;
      overflow: hidden;
    }

    @keyframes slideUp {
      to {
        transform: translateY(0);
      }
    }

    .login-box::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, #ff6b9d, #c44569, #ff6b9d);
      background-size: 200% 100%;
      animation: shimmer 2s linear infinite;
    }

    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .logo-section {
      text-align: center;
      margin-bottom: 35px;
    }

    .logo {
      width: 70px;
      height: 70px;
      background: linear-gradient(135deg, #ff6b9d, #c44569);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 15px;
      box-shadow: 0 10px 30px rgba(255, 107, 157, 0.4);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    .logo i {
      font-size: 28px;
      color: white;
    }

    h2 {
      font-size: 28px;
      font-weight: 700;
      background: linear-gradient(135deg, #2c3e50, #34495e);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }

    .subtitle {
      color: #7f8c8d;
      font-size: 14px;
      font-weight: 400;
    }

    .form-group {
      position: relative;
      margin-bottom: 25px;
    }

    .form-group input {
      width: 100%;
      padding: 16px 20px 16px 50px;
      border: 2px solid #e9ecef;
      border-radius: 15px;
      font-size: 16px;
      font-weight: 500;
      background: rgba(255, 255, 255, 0.8);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      backdrop-filter: blur(10px);
    }

    .form-group input:focus {
      outline: none;
      border-color: #ff6b9d;
      box-shadow: 0 0 0 4px rgba(255, 107, 157, 0.1);
      background: rgba(255, 255, 255, 1);
      transform: translateY(-2px);
    }

    .form-group i {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      color: #95a5a6;
      font-size: 18px;
      transition: color 0.3s ease;
    }

    .form-group input:focus + i,
    .form-group input:not(:placeholder-shown) + i {
      color: #ff6b9d;
    }

    .login-btn {
      width: 100%;
      padding: 18px;
      background: linear-gradient(135deg, #ff6b9d 0%, #c44569 100%);
      color: white;
      border: none;
      border-radius: 15px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
      text-transform: uppercase;
      letter-spacing: 1px;
      box-shadow: 0 10px 30px rgba(255, 107, 157, 0.4);
    }

    .login-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 20px 40px rgba(255, 107, 157, 0.5);
    }

    .login-btn:active {
      transform: translateY(-1px);
    }

    .login-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
      transition: left 0.5s;
    }

    .login-btn:hover::before {
      left: 100%;
    }

    .error {
      color: #e74c3c;
      margin-top: 15px;
      text-align: center;
      font-size: 14px;
      font-weight: 500;
      min-height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .floating-shapes {
      position: absolute;
      width: 100%;
      height: 100%;
      overflow: hidden;
      z-index: 0;
    }

    .shape {
      position: absolute;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 50%;
      animation: float 15s infinite linear;
    }

    .shape:nth-child(1) {
      width: 80px;
      height: 80px;
      top: 20%;
      left: 10%;
      animation-delay: 0s;
    }

    .shape:nth-child(2) {
      width: 120px;
      height: 120px;
      top: 60%;
      right: 15%;
      animation-delay: 5s;
    }

    .shape:nth-child(3) {
      width: 60px;
      height: 60px;
      bottom: 20%;
      left: 20%;
      animation-delay: 10s;
    }

    /* Responsive */
    @media (max-width: 480px) {
      .login-box {
        padding: 40px 25px;
        margin: 10px;
      }
      
      h2 {
        font-size: 24px;
      }
    }

    /* Loading Animation */
    .loading {
      display: none;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    .spinner {
      width: 25px;
      height: 25px;
      border: 3px solid rgba(255,255,255,0.3);
      border-top: 3px solid white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="floating-shapes">
    <div class="shape"></div>
    <div class="shape"></div>
    <div class="shape"></div>
  </div>

  <div class="login-container">
    <div class="login-box">
      <div class="logo-section">
        <div class="logo">
          <i class="fas fa-spa"></i>
        </div>
        <h2>HAM LUXURY PERFUME</h2>
        <p class="subtitle">Admin Dashboard Access</p>
      </div>

      <form id="loginForm">
        <div class="form-group">
          <input type="text" id="username" placeholder="👤 Admin Username" required />
          <i class="fas fa-user"></i>
        </div>
        
        <div class="form-group">
          <input type="password" id="password" placeholder="🔒 Password" required />
          <i class="fas fa-lock"></i>
        </div>

        <button type="submit" class="login-btn">
          <span class="btn-text">Login to Dashboard</span>
          <div class="loading">
            <div class="spinner"></div>
          </div>
        </button>
      </form>

      <p class="error" id="errorMsg">
        <i class="fas fa-exclamation-circle"></i>
        <span></span>
      </p>
    </div>
  </div>

  <script>
    const form = document.getElementById("loginForm");
    const errorMsg = document.getElementById("errorMsg");
    const loginBtn = document.querySelector(".login-btn");
    const btnText = document.querySelector(".btn-text");
    const loading = document.querySelector(".loading");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      
      // Show loading state
      loginBtn.disabled = true;
      btnText.style.opacity = "0";
      loading.style.display = "block";
      errorMsg.innerHTML = "";

      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();

      try {
        const res = await fetch("/api/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password })
        });

        if (!res.ok) {
          throw new Error("Invalid username or password");
        }

        const data = await res.json();
        localStorage.setItem("token", data.token);
        
        // Success animation
        loginBtn.innerHTML = '<i class="fas fa-check"></i> Welcome!';
        setTimeout(() => {
          window.location.href = "admin.html";
        }, 800);

      } catch (err) {
        errorMsg.innerHTML = `<i class="fas fa-exclamation-circle"></i> ${err.message}`;
      } finally {
        // Reset button state after 2 seconds
        setTimeout(() => {
          loginBtn.disabled = false;
          btnText.style.opacity = "1";
          loading.style.display = "none";
          loginBtn.innerHTML = '<span class="btn-text">Login to Dashboard</span><div class="loading"></div>';
        }, 2000);
      }
    });

    // Input focus effects
    document.querySelectorAll('input').forEach(input => {
      input.addEventListener('focus', function() {
        this.parentElement.classList.add('focused');
      });
      
      input.addEventListener('blur', function() {
        this.parentElement.classList.remove('focused');
      });
    });
  </script>
</body>
</html>
